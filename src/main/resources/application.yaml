spring:
  application:
    name: rag-springboot
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# Milvus向量数据库配置
milvus:
  host: localhost
  port: 19530
  username: ""
  password: ""
  collection-name: rag_documents
  dimension: 1536
  index-type: IVF_FLAT
  metric-type: COSINE

# Spring AI 配置
spring.ai:
  # DashScope 配置（通义千问 Qwen 模型）
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:""}
    chat:
      options:
        model: qwen-max
        temperature: 0.7

# 服务器配置
server:
  port: 8080

# 日志配置
logging:
  level:
    com.example.ragspringboot: DEBUG
    org.springframework.ai: INFO
    io.milvus: INFO
